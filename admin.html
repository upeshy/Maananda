<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{font-family:Arial,sans-serif;background:#0b1320;color:white;margin:0;padding:0;}
header{background:#020617;padding:15px;text-align:center;font-size:24px;color:#ffd900;}
.container{max-width:1200px;margin:auto;padding:20px;overflow-x:auto;}
h2{color:#ffd900;text-align:center;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;min-width:1000px;}
th,td{padding:10px;text-align:left;border-bottom:1px solid #444;}
th{background:#111827;}
tr:hover{background:rgba(255,221,0,0.1);}
button{padding:6px 12px;border:none;border-radius:6px;background:#ffd900;color:black;font-weight:bold;cursor:pointer;margin-right:4px;}
input,select,textarea{padding:6px;margin:4px 0;border-radius:4px;border:none;background:#020617;color:white;width:100%;}
.modal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);}
.modal-content{background:#020617;padding:20px;border-radius:10px;max-width:600px;width:90%;margin:5% auto;}
.close{float:right;cursor:pointer;color:#ffd900;}
</style>
</head>

<body>

<header>Admin Panel</header>

<div class="container">

<!-- LOGIN -->
<h2>Login</h2>
<div id="loginDiv">
<input type="email" id="adminEmail" placeholder="Email"><br>
<input type="password" id="adminPassword" placeholder="Password"><br>
<button onclick="loginAdmin()">Login</button>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none;">

<!-- STUDENTS -->
<h2>Students Records</h2>
<select id="categorySelect" onchange="loadRecords()">
<option value="coaching">Coaching</option>
</select>

<table>
<thead>
<tr>
<th>Name</th>
<th>Father</th>
<th>Mother</th>

<th>Phone</th>
<th>Email</th>
<th>DOB</th>
<th>Course</th>
<th>Address</th>
<th>Photo</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

<!-- SETTINGS -->
<div class="settings-section">
<h2>Website Settings</h2>

<label>Director</label>
<input id="directorName">
<button onclick="updateDirector()">Update Director</button>

<label>About</label>
<textarea id="aboutText"></textarea>
<button onclick="updateAbout()">Update About</button>

<label>Admin News (Website)</label>
<input id="adminNews">
<button onclick="updateAdminNews()">Update Admin News</button>

<label>Popup News</label>
<textarea id="newsText"></textarea>

<label>Show Popup</label>
<select id="newsShow">
  <option value="true">Show</option>
  <option value="false">Hide</option>
</select>

<button onclick="updatePopupNews()">Update Popup News</button>
<button onclick="deletePopupNews()">Delete Popup News</button>
</div>

</div>


<!-- EDIT MODAL -->
<div class="modal" id="editModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h3>Edit Student</h3>
<input id="editName">
<input id="editFather">
<input id="editMother">
<input id="editBranch">
<input id="editPhone">
<input id="editEmail">
<input id="editDOB" type="date">
<input id="editCourse">
<textarea id="editAddress"></textarea>
<button onclick="updateRecord()">Save</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, onValue, update, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Firebase
const firebaseConfig = {
apiKey: "AIzaSyD9bD9ijZK6WUkE7A9GyyiSnjLUozNXz7U",
authDomain: "raghav-d9e01.firebaseapp.com",
databaseURL: "https://raghav-d9e01-default-rtdb.firebaseio.com",
projectId: "raghav-d9e01",
storageBucket: "raghav-d9e01.firebasestorage.app",
messagingSenderId: "902935133374",
appId: "1:902935133374:web:5b27fbc0bfd8506b7f32ef"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentCategory="coaching";
let editKey="";

// LOGIN
window.loginAdmin=()=>{
signInWithEmailAndPassword(auth,adminEmail.value,adminPassword.value)
.then(()=>{
alert("Login Success ✅");
loginDiv.style.display="none";
adminPanel.style.display="block";
loadRecords();
loadSettings();
})
.catch(e=>alert(e.message));
}

// LOAD STUDENTS
window.loadRecords=()=>{
currentCategory=categorySelect.value;

onValue(ref(db,"students/"+currentCategory),(snap)=>{
studentTable.innerHTML="";
if(snap.exists()){
snap.forEach(s=>{
let d=s.val();
studentTable.innerHTML+=`
<tr>
<td>${d.name||""}</td>
<td>${d.father||""}</td>
<td>${d.mother||""}</td>

<td>${d.phone||""}</td>
<td>${d.email||""}</td>
<td>${d.dob||""}</td>
<td>${d.course||""}</td>
<td>${d.address||""}</td>
<td><img src="${d.photo||""}" width="40"></td>
<td>
<button onclick="edit('${s.key}')">Edit</button>
<button onclick="del('${s.key}')">Delete</button>
</td>
</tr>`;
});
}
});
}

// DELETE
window.del=(key)=>{
if(confirm("Delete?")){
remove(ref(db,"students/"+currentCategory+"/"+key));
}
}

// EDIT
window.edit=(key)=>{
editKey=key;
get(child(ref(db),"students/"+currentCategory+"/"+key))
.then(s=>{
let d=s.val();
editName.value=d.name||"";
editFather.value=d.father||"";
editMother.value=d.mother||"";

editPhone.value=d.phone||"";
editEmail.value=d.email||"";
editDOB.value=d.dob||"";
editCourse.value=d.course||"";
editAddress.value=d.address||"";
editModal.style.display="block";
});
}

window.closeModal=()=>editModal.style.display="none";

// UPDATE STUDENT
window.updateRecord=()=>{
update(ref(db,"students/"+currentCategory+"/"+editKey),{
name:editName.value,
father:editFather.value,
mother:editMother.value,

phone:editPhone.value,
email:editEmail.value,
dob:editDOB.value,
course:editCourse.value,
address:editAddress.value
});
editModal.style.display="none";
alert("Updated ✅");
}

// SETTINGS LOAD

// 🔥 Load Settings
function loadSettings(){
  onValue(ref(db,"settings"), (snap)=>{
    let d = snap.val() || {};

    // Basic
    directorName.value = d.director || "";
    aboutText.value = d.about || "";

    // ✅ Admin News
    adminNews.value = d.adminNews || "";

    // ✅ Popup News
    if(d.news){
      newsText.value = d.news.text || "";
      newsShow.value = d.news.show ? "true" : "false";
    } else {
      newsText.value = "";
      newsShow.value = "false";
    }
  });
}


// ✅ Admin News Update
window.updateAdminNews = function(){
  const value = document.getElementById("adminNews").value;

  update(ref(db,"settings"), { adminNews: value })
  .then(()=> alert("Admin News Updated ✅"))
  .catch(err=> alert("Error ❌ " + err.message));
}


// ✅ Popup News Update
window.updatePopupNews = function(){
  const data = {
    news: {
      text: document.getElementById("newsText").value,
      show: document.getElementById("newsShow").value === "true"
    }
  };

  update(ref(db,"settings"), data)
  .then(()=> alert("Popup News Updated ✅"))
  .catch(err=> alert("Error ❌ " + err.message));
}


// ✅ Delete Popup News
window.deletePopupNews = function(){
  remove(ref(db,"settings/news"))
  .then(()=> {
    alert("Popup News Deleted ✅");
    newsText.value = "";
    newsShow.value = "false";
  })
  .catch(err=> alert("Error ❌ " + err.message));
}


</script>

</body>
</html>
